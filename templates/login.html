<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --teal:    #00a884;
    --teal-d:  #017a5e;
    --bg:      #111b21;
    --surface: #202c33;
    --card:    #2a3942;
    --border:  #3b4a54;
    --text:    #e9edef;
    --muted:   #8696a0;
    --font:    'Plus Jakarta Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Animated background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: drift 12s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--teal);
    top: -150px; left: -150px;
  }
  body::after {
    width: 400px; height: 400px;
    background: #128c7e;
    bottom: -100px; right: -100px;
    animation-delay: -6s;
  }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px,30px) scale(1.08); }
  }

  .wrapper {
    display: flex;
    width: 880px;
    min-height: 540px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    position: relative; z-index: 1;
  }

  /* Left panel */
  .panel-left {
    flex: 1;
    background: linear-gradient(145deg, #00a884 0%, #017a5e 60%, #005c46 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem;
    position: relative; overflow: hidden;
  }
  .panel-left::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .brand-icon {
    width: 90px; height: 90px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    font-size: 2.5rem;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .panel-left h1 {
    font-size: 2rem; font-weight: 800;
    color: white; text-align: center; margin-bottom: 0.8rem;
    letter-spacing: -0.02em;
  }
  .panel-left p {
    font-size: 0.92rem; color: rgba(255,255,255,0.75);
    text-align: center; line-height: 1.6; max-width: 260px;
  }
  .feature-list {
    margin-top: 2rem; list-style: none;
  }
  .feature-list li {
    font-size: 0.83rem; color: rgba(255,255,255,0.8);
    padding: 0.4rem 0; display: flex; align-items: center; gap: 0.6rem;
  }
  .feature-list li::before {
    content: '✓';
    background: rgba(255,255,255,0.2);
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
  }

  /* Right panel */
  .panel-right {
    width: 420px;
    background: var(--surface);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 3rem 2.5rem;
  }
  .panel-right h2 {
    font-size: 1.6rem; font-weight: 800;
    color: var(--text); margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
  }
  .panel-right .sub {
    font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem;
  }
  .panel-right .sub a {
    color: var(--teal); text-decoration: none; font-weight: 600;
  }
  .panel-right .sub a:hover { text-decoration: underline; }

  .field {
    margin-bottom: 1.1rem;
  }
  .field label {
    display: block; font-size: 0.75rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 0.4rem;
  }
  .field input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 10px;
    font-family: var(--font); font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0,168,132,0.15);
  }
  .field input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 0.85rem;
    background: var(--teal);
    color: white; border: none; border-radius: 10px;
    font-family: var(--font); font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
    letter-spacing: 0.01em;
  }
  .btn:hover {
    background: var(--teal-d);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0,168,132,0.35);
  }

  .error {
    background: rgba(220,38,38,0.12);
    border: 1px solid rgba(220,38,38,0.3);
    color: #fca5a5;
    padding: 0.7rem 1rem; border-radius: 8px;
    font-size: 0.85rem; margin-bottom: 1rem;
  }

  @media (max-width: 700px) {
    .wrapper { flex-direction: column; width: 95%; }
    .panel-left { padding: 2rem; min-height: 200px; }
    .panel-right { width: 100%; padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="panel-left">
    <div class="brand-icon">💬</div>
    <h1>ChatApp</h1>
    <p>Your personal WhatsApp-style messenger. Fast, simple, and real-time.</p>
    <ul class="feature-list">
      <li>Real-time messaging</li>
      <li>Private & group chats</li>
      <li>Online status</li>
      <li>Message history</li>
    </ul>
  </div>
  <div class="panel-right">
    <h2>Welcome back 👋</h2>
    <p class="sub">Don't have an account? <a href="/register">Sign up free</a></p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button class="btn" type="submit">Sign In →</button>
    </form>
  </div>
</div>
</body>
</html>
